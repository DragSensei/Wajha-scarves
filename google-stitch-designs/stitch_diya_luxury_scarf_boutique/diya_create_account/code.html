<style>

            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            transition: all 0.3s ease;
        }
        
        .luminous-shadow {
            box-shadow: 0 20px 40px -10px rgba(120, 90, 0, 0.08);
        }

        .input-focus-glow:focus {
            box-shadow: 0 4px 12px -2px rgba(191, 144, 1, 0.1);
            outline: none;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {

            to { opacity: 1; transform: translateY(0); }

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center">
<!-- Brand Header -->
<header class="w-full flex justify-center py-12 md:py-16">
<a class="group flex flex-col items-center gap-2" href="/">
<span class="font-headline-md text-headline-md tracking-tighter text-on-surface transition-transform duration-500 group-hover:scale-105">DIYA</span>
<span class="font-label-caps text-label-caps text-primary tracking-widest opacity-80">AN-NUR</span>
</a>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-container-max flex flex-col items-center px-margin-mobile md:px-margin-desktop mb-24">
<!-- Register Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest p-8 md:p-12 rounded-lg luminous-shadow fade-in">
<div class="text-center mb-10">
<h1 class="font-headline-sm text-headline-sm text-on-surface mb-2">Create Your Account</h1>
<p class="font-body-md text-body-md text-on-tertiary-fixed-variant opacity-70">Join our exclusive circle of luxury and modesty.</p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-8" method="POST">
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- First Name -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="first_name">First Name</label>
<input class="bg-transparent border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary input-focus-glow transition-all duration-300" id="first_name" name="first_name" placeholder="Aisha" required="" type="text"/>
</div>
<!-- Last Name -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="last_name">Last Name</label>
<input class="bg-transparent border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary input-focus-glow transition-all duration-300" id="last_name" name="last_name" placeholder="Rahman" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="bg-transparent border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary input-focus-glow transition-all duration-300" id="email" name="email" placeholder="aisha@example.com" required="" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Create Password</label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant py-3 px-1 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary input-focus-glow transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="password_toggle_icon">visibility</span>
</button>
</div>
<p class="text-[10px] text-on-surface-variant opacity-60 mt-1">Minimum 8 characters with a mix of letters and numbers.</p>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary py-5 px-6 font-label-caps text-label-caps uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all duration-300 luminous-shadow" type="submit">
                        Create Account
                    </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant opacity-50"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant opacity-50">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-50"></div>
</div>
<!-- Social Sign Up -->
<div class="flex flex-col md:flex-row gap-4">
<button class="flex-1 flex items-center justify-center gap-2 border border-outline-variant py-4 px-4 hover:bg-surface-container transition-all group" type="button">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

<span class="font-label-caps text-label-caps text-on-surface">Google</span>

</svg>
<span class="font-label-caps text-label-caps text-on-surface">Facebook</span>
</button>

<!-- Scripts -->
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password_toggle_icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Ambient micro-interaction: Subtle mouse glow effect on the card
        const card = document.querySelector('.luminous-shadow');
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const { left, top, width, height } = card.getBoundingClientRect();
            
            const x = (clientX - left) / width;
            const y = (clientY - top) / height;

            if (x > 0 && x < 1 && y > 0 && y < 1) {
                card.style.boxShadow = `0 ${20 + y*5}px ${40 + x*10}px -10px rgba(120, 90, 0, ${0.08 + y*0.02})`;
            }
        });
    </script>
</body></html>
